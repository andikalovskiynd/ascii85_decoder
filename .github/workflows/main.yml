name: ASCII85 (de)coder

on:
  push:
    branches:
      - main 
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-22.04 

    steps:
    - name: Checkout code 
      uses: actions/checkout@v4

    - name: Install build dependencies 
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake python3 python3-pip

    - name: Build and Install Google Test
      run: |
        git clone https://github.com/google/googletest.git /tmp/googletest
        cd /tmp/googletest
        mkdir build
        cd build
        cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/local
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Build project
      run: |
        export CI=1
        make all

    - name: Run Google tests
      run: |
        export CI=1
        make test

    - name: Run Python tests
      run: |
        cd test
        python3 test.py
